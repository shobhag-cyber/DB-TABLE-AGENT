<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Table Agent</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1f1f1f;padding:16px;background:#fff}
    h2{font-size:15px;font-weight:600;margin-bottom:4px}
    p.sub{font-size:12px;color:#666;margin-bottom:16px}
    button#scanBtn{width:100%;padding:9px;background:#0F6E56;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
    button#scanBtn:hover{background:#085041}
    button#scanBtn:disabled{background:#ccc;cursor:not-allowed}
    .status{font-size:12px;color:#666;margin-top:10px;min-height:18px}
    .error{color:#c0392b;font-size:12px;margin-top:8px;background:#fdf0ee;padding:8px;border-radius:6px}
    table{width:100%;margin-top:16px;border-collapse:collapse;font-size:12px}
    th{text-align:left;padding:6px 8px;background:#f4f4f4;font-weight:600;border-bottom:1px solid #e0e0e0}
    td{padding:6px 8px;border-bottom:1px solid #f0f0f0}
    .sorted{color:#0F6E56;font-weight:600}
    .unsorted{color:#c0392b;font-weight:600}
    .email-section{margin-top:16px;border-top:1px solid #eee;padding-top:12px}
    .email-section h3{font-size:13px;font-weight:600;margin-bottom:8px}
    pre{font-family:'Courier New',monospace;font-size:11px;white-space:pre-wrap;background:#f8f8f8;padding:10px;border-radius:6px;border:1px solid #eee;line-height:1.6}
    .copy-btn{display:block;width:100%;margin-top:8px;padding:7px;background:transparent;color:#0F6E56;border:1px solid #0F6E56;border-radius:6px;font-size:12px;cursor:pointer}
    .copy-btn:hover{background:#f0faf6}
    .hint{font-size:11px;color:#888;margin-top:16px;line-height:1.5;background:#f9f9f9;padding:8px;border-radius:6px}
  </style>
</head>
<body>
  <h2>DB Table Agent</h2>
  <p class="sub">Scans your inbox and summarises sorted &amp; unsorted tables per database.</p>

  <button id="scanBtn" onclick="scanEmails()">Scan my emails</button>
  <div class="status" id="statusMsg"></div>
  <div class="error" id="errorMsg" style="display:none"></div>
  <div id="resultsArea"></div>

  <div class="hint">
    Tip: Also available in <strong>Microsoft 365 Copilot</strong> — just say "Summarise my DB table emails".
  </div>

  <script type="text/javascript">
    var CLAUDE_API = "https://api.anthropic.com/v1/messages";
    var API_KEY    = "YOUR_ANTHROPIC_API_KEY";

    Office.onReady(function(info) {
      if (info.host !== Office.HostType.Outlook) {
        showError("This add-in only works in Outlook.");
      }
    });

    function scanEmails() {
      var btn = document.getElementById('scanBtn');
      btn.disabled = true;
      setStatus("Connecting to your mailbox...");
      clearError();
      document.getElementById('resultsArea').innerHTML = "";

      var mailbox = Office.context.mailbox;
      mailbox.getCallbackTokenAsync({ isRest: true }, function(tokenResult) {
        if (tokenResult.status !== Office.AsyncResultStatus.Succeeded) {
          showError("Could not get mailbox token. Please check you are signed into Outlook.");
          btn.disabled = false;
          return;
        }

        var token = tokenResult.value;
        var restUrl = mailbox.restUrl || "https://outlook.office.com";

        setStatus("Reading your recent emails...");

        fetch(restUrl + "/v2.0/me/messages?$top=20&$select=subject,body&$filter=isDraft eq false",
          { headers: { Authorization: "Bearer " + token } }
        ).then(function(resp) {
          if (!resp.ok) throw new Error("Could not read emails: HTTP " + resp.status);
          return resp.json();
        }).then(function(data) {
          var emails = data.value || [];
          if (!emails.length) {
            showError("No emails found in your inbox.");
            btn.disabled = false;
            return;
          }

          var emailText = emails.map(function(e) {
            var body = (e.body && e.body.content) ? e.body.content.replace(/<[^>]+>/g, " ") : "";
            return "Subject: " + e.subject + "\n" + body;
          }).join("\n\n---\n\n");

          setStatus("Analysing with Claude AI...");

          return fetch(CLAUDE_API, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY,
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: "Extract database sorted/unsorted table info from emails. Sorted = indexed/ordered/partitioned. Unsorted = unindexed/raw/unordered. Return ONLY valid JSON, no markdown: { \"databases\": [{\"name\":\"string\",\"sorted\":0,\"unsorted\":0,\"source\":\"string\"}], \"summary_email\": \"plain text\" }",
              messages: [{ role: "user", content: "Analyse these emails:\n\n" + emailText }]
            })
          }).then(function(r){ return r.json(); }).then(function(aiData) {
            if (aiData.error) throw new Error(aiData.error.message);
            var raw = aiData.content.map(function(b){ return b.text || ""; }).join("");
            var clean = raw.replace(/```json|```/g, "").trim();
            var parsed = JSON.parse(clean);
            renderResults(parsed, emails.length);
            setStatus("");
            btn.disabled = false;
          });
        }).catch(function(e) {
          showError(e.message);
          btn.disabled = false;
        });
      });
    }

    function renderResults(data, scannedCount) {
      var dbs = data.databases || [];
      var emailDraft = data.summary_email || "";
      if (!dbs.length) {
        document.getElementById('resultsArea').innerHTML =
          '<p style="color:#888;font-size:12px;margin-top:12px">No database table info found in your emails.</p>';
        return;
      }
      var html = '<p style="font-size:11px;color:#888;margin-top:12px">' + scannedCount + ' emails scanned</p>';
      html += '<table><thead><tr><th>Database</th><th>Sorted</th><th>Unsorted</th><th>Total</th></tr></thead><tbody>';
      dbs.forEach(function(db) {
        var total = (db.sorted || 0) + (db.unsorted || 0);
        html += '<tr><td title="' + db.source + '">' + db.name + '</td>';
        html += '<td class="sorted">' + (db.sorted || 0) + '</td>';
        html += '<td class="unsorted">' + (db.unsorted || 0) + '</td>';
        html += '<td>' + total + '</td></tr>';
      });
      html += '</tbody></table>';
      if (emailDraft) {
        html += '<div class="email-section"><h3>Summary email draft</h3>';
        html += '<pre id="draftEmail">' + escHtml(emailDraft) + '</pre>';
        html += '<button class="copy-btn" onclick="copyDraft()">Copy email draft</button></div>';
      }
      document.getElementById('resultsArea').innerHTML = html;
    }

    function copyDraft() {
      var el = document.getElementById('draftEmail');
      if (!el) return;
      navigator.clipboard.writeText(el.innerText).then(function() {
        var btn = document.querySelector('.copy-btn');
        btn.textContent = "Copied!";
        setTimeout(function(){ btn.textContent = "Copy email draft"; }, 2000);
      });
    }

    function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
    function clearError() { var e=document.getElementById('errorMsg'); e.style.display="none"; e.textContent=""; }
    function showError(msg) { var e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display="block"; setStatus(""); }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
